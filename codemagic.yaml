workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    integrations:
      app_store_connect: Cuenta Apple Felix
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ploegmakers.fitai
    scripts:
      - name: Rebuild iOS Native Project and Fetch Dependencies
        script: |
          cd fitai_pro
          rm -rf ios
          flutter create . --platforms=ios --org com.ploegmakers --project-name fitai
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
      - name: Install Pods Dependencies
        script: |
          cd fitai_pro/ios
          pod repo update
          pod install --repo-update
      - name: Prepare Apple Certificates
        script: |
          keychain initialize
          xcode-project use-profiles
      - name: Build iOS IPA and Auto Sign
        script: |
          cd fitai_pro
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist \
            --build-number=$((${BUILD_NUMBER:-1}))
    artifacts:
      - fitai_pro/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
