workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    cache:
      cache_paths: []
    integrations:
      app_store_connect: Cuenta Apple Felix
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ploegmakers.fitai
    scripts:
      - name: Hard Clean Project
        script: |
          cd fitai_pro
          rm -rf ios
          rm -rf .dart_tool
          rm -f pubspec.lock
          flutter clean
      - name: Rebuild iOS Native Project
        script: |
          cd fitai_pro
          flutter create . --platforms=ios --org com.ploegmakers --project-name fitai
      - name: Fetch Dependencies and Generate Configs
        script: |
          cd fitai_pro
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
      - name: Force iOS 15.5 Deployment Target
        script: |
          echo "IPHONEOS_DEPLOYMENT_TARGET=15.5" >> fitai_pro/ios/Flutter/Generated.xcconfig
          echo "platform :ios, '15.5'" | cat - fitai_pro/ios/Podfile > temp && mv temp fitai_pro/ios/Podfile
      - name: Install Pods Dependencies
        script: |
          cd fitai_pro/ios
          pod repo update
          pod install --repo-update
      - name: Prepare Apple Certificates
        script: |
          keychain initialize
          xcode-project use-profiles
      - name: Build iOS IPA and Auto Sign
        script: |
          cd fitai_pro
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$((${BUILD_NUMBER:-1}))
    artifacts:
      - fitai_pro/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

