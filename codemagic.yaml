workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ploegmakers.fitai
    integrations:
      app_store_connect: Cuenta Apple Felix
    scripts:
      - name: Set up project
        script: |
          cd fitai_pro
          flutter create . --org com.ploegmakers --project-name fitai
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
      - name: Write Podfile
        script: |
          cat > fitai_pro/ios/Podfile << 'EOF'
          platform :ios, '15.5'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'
          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }
          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
          end
          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)
          flutter_ios_podfile_setup
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            target 'RunnerTests' do
              inherit! :search_paths
            end
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.5'
              end
            end
          end
          EOF
      - name: Install pods
        script: |
          cd fitai_pro/ios && pod install
      - name: Build iOS
        script: |
          cd fitai_pro
          flutter build ipa --release
    artifacts:
      - fitai_pro/build/ios/ipa/*.ipa