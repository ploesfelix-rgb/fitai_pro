workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up project
        script: |
          cd fitai_pro
          flutter create . --org com.fitai --project-name fitai_pro
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
      - name: Install pods
        script: |
          cd fitai_pro/ios
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '15.5'/" Podfile
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '15.5'/" Podfile
          pod install
      - name: Build iOS
        script: |
          cd fitai_pro
          flutter build ipa --release
    artifacts:
      - fitai_pro/build/ios/ipa/*.ipa