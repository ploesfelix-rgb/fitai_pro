workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    cache:
      cache_paths: []
    integrations:
      app_store_connect: Cuenta Apple Felix
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ploegmakers.fitai
    scripts:
      - name: Hard Clean Project
        script: |
          cd fitai_pro
          rm -rf ios
          rm -rf .dart_tool
          rm -f pubspec.lock
          flutter clean
      - name: Rebuild iOS Native Project
        script: |
          cd fitai_pro
          flutter create . --platforms=ios --org com.ploegmakers --project-name fitai
      - name: Fetch Dependencies and Generate Configs
        script: |
          cd fitai_pro
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
      - name: Inject Clean Podfile and Exclude Duplicate SQLite
        script: |
          echo "IPHONEOS_DEPLOYMENT_TARGET=15.5" >> fitai_pro/ios/Flutter/Generated.xcconfig
          
          cat > fitai_pro/ios/Podfile << 'EOF'
          platform :ios, '15.5'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'
          
          def flutter_root
            gen_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            root_path = nil
            File.foreach(gen_path) do |line|
              if line =~ /FLUTTER_ROOT\=(.*)/
                root_path = $1.strip
                break
              end
            end
            root_path
          end
          
          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)
          flutter_ios_podfile_setup
          
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              
              if target.name == 'sqlite3_flutter_libs'
                target.remove_from_project
              end
              
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.5'
                config.build_settings['DEVELOPMENT_TEAM'] = ENV['COCOAPODS_DEVELOPMENT_TEAM'] if ENV['COCOAPODS_DEVELOPMENT_TEAM']
              end
            end
          end
          EOF
      - name: Install Pods Dependencies
        script: |
          cd fitai_pro/ios
          pod repo update
          pod install --repo-update
      - name: Prepare Apple Certificates
        script: |
          keychain initialize
          xcode-project use-profiles
      - name: Build iOS IPA and Auto Sign
        script: |
          cd fitai_pro
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$((${BUILD_NUMBER:-1}))
          
          # TRUCO DEFINITIVO: Buscamos el archivo generado en la subcarpeta y lo copiamos a la raíz
          find build/ios/ipa -name "*.ipa" -exec cp {} ../ \; 2>/dev/null || find . -name "*.ipa" -exec cp {} ../ \;
    artifacts:
      # Ahora Codemagic solo tiene que buscar el archivo en la raíz del proyecto
      - "*.ipa"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true






